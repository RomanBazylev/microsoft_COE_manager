name: SF Auto-Poster

on:
  schedule:
    - cron: "0 8 * * 1,3,5"   # Mon/Wed/Fri 08:00 UTC — all channels
    - cron: "0 8 * * 2,4"      # Tue/Thu 08:00 UTC — topic-of-the-day only (daily tip card)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — log only, do NOT post to Teams"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      channels_filter:
        description: "Channels to run (comma-separated, leave blank for all)"
        required: false
        default: ""
        type: string

jobs:
  run-autoposter:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: Determine channels filter
        id: channels
        run: |
          # Manual dispatch: use input if provided
          # Scheduled Tue/Thu (cron "0 8 * * 2,4"): topic-of-the-day only
          # Scheduled Mon/Wed/Fri: all channels (empty filter)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "filter=${{ github.event.inputs.channels_filter }}" >> $GITHUB_OUTPUT
          else
            DAY=$(date -u +%u)   # 1=Mon ... 7=Sun
            if [ "$DAY" = "2" ] || [ "$DAY" = "4" ]; then
              echo "filter=topic-of-the-day" >> $GITHUB_OUTPUT
            else
              echo "filter=" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run pipeline
        env:
          DRY_RUN:        ${{ github.event.inputs.dry_run || 'false' }}
          CHANNELS_FILTER: ${{ steps.channels.outputs.filter }}
          GEMINI_API_KEY:                 ${{ secrets.GEMINI_API_KEY }}
          TEAMS_WEBHOOK_CERTIFICATION:    ${{ secrets.TEAMS_WEBHOOK_CERTIFICATION }}
          TEAMS_WEBHOOK_PLAYGROUND:       ${{ secrets.TEAMS_WEBHOOK_PLAYGROUND }}
          TEAMS_WEBHOOK_SALESFORCE_RSS:   ${{ secrets.TEAMS_WEBHOOK_SALESFORCE_RSS }}
          TEAMS_WEBHOOK_NEED_HELP:        ${{ secrets.TEAMS_WEBHOOK_NEED_HELP }}
          TEAMS_WEBHOOK_MEETUP_EVENTS:    ${{ secrets.TEAMS_WEBHOOK_MEETUP_EVENTS }}
          TEAMS_WEBHOOK_TOPIC_OF_THE_DAY: ${{ secrets.TEAMS_WEBHOOK_TOPIC_OF_THE_DAY }}
        run: python src/main.py || exit 1

      - name: Sync log and tip images to docs
        run: |
          mkdir -p docs
          cp data/post_log.json docs/post_log.json
          echo "{\"run_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"trigger\": \"${{ github.event_name }}\", \"dry_run\": \"${{ github.event.inputs.dry_run || 'false' }}\"}" > docs/last_run.json

      - name: Clean up tip PNGs older than 30 days
        run: |
          find docs -name "tip_*.png" -mtime +30 -print -delete || true
          echo "Cleanup done (kept last 30 days of tip cards)"

      - name: Commit data back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/post_log.json data/seen_ids.json data/tip_used_ids.json docs/post_log.json docs/last_run.json docs/tip_*.png
          git add -u docs/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "bot: update post log + tip card [skip ci]"
          git push
