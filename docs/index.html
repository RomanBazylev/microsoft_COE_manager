<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SF COE Auto-Poster — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0d0f12; --surface:#13171d; --surface2:#1a1f28; --border:#242a35;
      --accent:#00c4ff; --accent2:#7c5cfc; --green:#00e676; --amber:#ffb300;
      --red:#ff5252; --text:#d4dbe8; --muted:#5a6478;
      --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
    }
    body { background:var(--bg); color:var(--text); font-family:var(--sans); font-size:14px; line-height:1.6; min-height:100vh; }
    header { border-bottom:1px solid var(--border); padding:0 32px; display:flex; align-items:center; gap:16px; height:56px; position:sticky; top:0; background:var(--bg); z-index:100; }
    .logo { font-family:var(--mono); font-size:13px; color:var(--accent); letter-spacing:.08em; text-transform:uppercase; white-space:nowrap; }
    .logo span { color:var(--muted); }
    header .spacer { flex:1; }
    #last-run { font-family:var(--mono); font-size:11px; color:var(--muted); white-space:nowrap; }
    .live-dot { width:6px; height:6px; background:var(--green); border-radius:50%; display:inline-block; margin-right:6px; box-shadow:0 0 6px var(--green); animation:pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    #btn-run { display:flex; align-items:center; gap:6px; background:var(--accent); color:#000; border:none; padding:6px 14px; border-radius:6px; font-family:var(--mono); font-size:12px; font-weight:500; cursor:pointer; transition:opacity .15s; white-space:nowrap; }
    #btn-run:hover { opacity:.85; }
    #btn-run:disabled { opacity:.4; cursor:not-allowed; }
    #btn-token { background:transparent; border:1px solid var(--border); color:var(--muted); padding:6px 10px; border-radius:6px; font-family:var(--mono); font-size:11px; cursor:pointer; transition:border-color .15s; }
    #btn-token:hover { border-color:var(--accent); color:var(--accent); }
    #toast { position:fixed; bottom:24px; right:24px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:12px 18px; font-family:var(--mono); font-size:12px; opacity:0; transform:translateY(8px); transition:opacity .2s,transform .2s; z-index:999; pointer-events:none; }
    #toast.show { opacity:1; transform:translateY(0); }
    #toast.ok { border-color:var(--green); color:var(--green); }
    #toast.err { border-color:var(--red); color:var(--red); }
    .container { max-width:1280px; margin:0 auto; padding:28px 24px; }
    .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:28px; }
    .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px 20px; }
    .stat-card .label { font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
    .stat-card .value { font-family:var(--mono); font-size:28px; font-weight:500; color:var(--accent); line-height:1; }
    .stat-card .value.green { color:var(--green); }
    .stat-card .value.red   { color:var(--red); }
    .stat-card .value.amber { color:var(--amber); }
    .stat-card .value.purple { color:var(--accent2); }
    .stat-card .sub { font-size:11px; color:var(--muted); margin-top:4px; }
    .section-header { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
    .section-title { font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); white-space:nowrap; }
    .section-header hr { flex:1; border:none; border-top:1px solid var(--border); }
    .filters { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
    .filter-group { display:flex; gap:4px; flex-wrap:wrap; }
    .chip { padding:4px 10px; border-radius:20px; border:1px solid var(--border); font-family:var(--mono); font-size:11px; color:var(--muted); cursor:pointer; transition:all .15s; background:transparent; white-space:nowrap; }
    .chip:hover { border-color:var(--accent); color:var(--accent); }
    .chip.active { background:var(--accent); color:#000; border-color:var(--accent); }
    .filter-sep { width:1px; background:var(--border); margin:0 4px; }
    .table-wrap { overflow-x:auto; border:1px solid var(--border); border-radius:8px; }
    table { width:100%; border-collapse:collapse; }
    thead th { padding:10px 14px; text-align:left; font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--border); white-space:nowrap; background:var(--surface); }
    tbody tr { border-bottom:1px solid var(--border); transition:background .1s; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:var(--surface2); }
    td { padding:10px 14px; vertical-align:top; }
    .badge { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:4px; font-family:var(--mono); font-size:11px; font-weight:500; white-space:nowrap; }
    .badge-posted { background:rgba(0,230,118,.12); color:var(--green); }
    .badge-failed { background:rgba(255,82,82,.12); color:var(--red); }
    .badge-dry    { background:rgba(255,179,0,.12); color:var(--amber); }
    .channel-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-family:var(--mono); font-size:11px; white-space:nowrap; }
    .ch-certification    { background:rgba(0,196,255,.12); color:var(--accent); }
    .ch-playground       { background:rgba(124,92,252,.12); color:var(--accent2); }
    .ch-salesforce-rss   { background:rgba(0,230,118,.12); color:var(--green); }
    .ch-need-help        { background:rgba(255,179,0,.12); color:var(--amber); }
    .ch-meetup-events    { background:rgba(255,82,82,.12); color:var(--red); }
    .ch-topic-of-the-day { background:rgba(180,180,255,.12); color:#b4b4ff; }
    .source-badge { display:inline-flex; align-items:center; gap:4px; font-size:12px; color:var(--muted); }
    .title-cell a { color:var(--text); text-decoration:none; }
    .title-cell a:hover { color:var(--accent); }
    .title-cell .domain { font-size:11px; color:var(--muted); margin-top:2px; }
    .error-msg { font-family:var(--mono); font-size:11px; color:var(--red); margin-top:4px; }
    .score-bar { display:flex; align-items:center; gap:6px; }
    .score-track { width:52px; height:4px; background:var(--surface2); border-radius:2px; overflow:hidden; }
    .score-fill { height:100%; border-radius:2px; background:var(--accent); }
    .score-fill.hi { background:var(--green); }
    .score-fill.lo { background:var(--amber); }
    .score-num { font-family:var(--mono); font-size:11px; color:var(--muted); }
    .ts { font-family:var(--mono); font-size:11px; color:var(--muted); white-space:nowrap; }
    .empty-state { text-align:center; padding:48px 24px; color:var(--muted); font-family:var(--mono); font-size:13px; }
    .sources-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:8px; }
    .source-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 16px; display:flex; align-items:flex-start; gap:12px; }
    .source-icon { font-size:16px; margin-top:2px; flex-shrink:0; }
    .source-info { flex:1; min-width:0; }
    .source-domain { font-family:var(--mono); font-size:12px; color:var(--text); }
    .source-channels { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
    .source-status { font-family:var(--mono); font-size:10px; margin-top:4px; }
    .source-status.ok    { color:var(--green); }
    .source-status.stale { color:var(--amber); }
    @media(max-width:700px) { header{padding:0 16px;gap:10px;} .container{padding:16px 12px;} .stats{grid-template-columns:repeat(2,1fr);} }
  </style>
</head>
<body>
<header>
  <div class="logo">SF COE <span>/</span> Auto-Poster</div>
  <div class="spacer"></div>
  <div id="last-run"><span class="live-dot"></span>Loading...</div>
  <button id="btn-run" onclick="runNow()">&#9654; Run Now</button>
  <button id="btn-token" onclick="resetToken()" title="Set / reset GitHub PAT">&#128273;</button>
</header>

<div id="toast"></div>

<div class="container">

  <div class="stats">
    <div class="stat-card"><div class="label">Total Posted</div><div class="value" id="stat-total">-</div></div>
    <div class="stat-card"><div class="label">This Week</div><div class="value green" id="stat-week">-</div></div>
    <div class="stat-card"><div class="label">Failed</div><div class="value red" id="stat-failed">-</div></div>
    <div class="stat-card"><div class="label">Success Rate</div><div class="value" id="stat-rate">-</div></div>
    <div class="stat-card"><div class="label">Channels</div><div class="value purple" id="stat-channels">-</div><div class="sub" id="stat-channels-list"></div></div>
    <div class="stat-card"><div class="label">Last Post</div><div class="value amber" style="font-size:16px;line-height:1.3" id="stat-last">-</div></div>
  </div>

  <div class="section-header"><span class="section-title">Post Log</span><hr /></div>

  <div class="filters" id="filter-bar">
    <div class="filter-group" id="filter-status">
      <button class="chip active" data-group="status" data-val="all">All</button>
      <button class="chip" data-group="status" data-val="posted">&#10003; Posted</button>
      <button class="chip" data-group="status" data-val="failed">&#10007; Failed</button>
      <button class="chip" data-group="status" data-val="dry-run">Dry-run</button>
    </div>
    <div class="filter-sep"></div>
    <div class="filter-group" id="filter-source">
      <button class="chip active" data-group="source" data-val="all">All Sources</button>
      <button class="chip" data-group="source" data-val="rss">RSS</button>
      <button class="chip" data-group="source" data-val="youtube">YouTube</button>
    </div>
    <div class="filter-sep"></div>
    <div class="filter-group" id="filter-channel">
      <button class="chip active" data-group="channel" data-val="all">All Channels</button>
      <button class="chip" data-group="channel" data-val="certification">#certification</button>
      <button class="chip" data-group="channel" data-val="playground">#playground</button>
      <button class="chip" data-group="channel" data-val="salesforce-rss">#salesforce-rss</button>
      <button class="chip" data-group="channel" data-val="need-help">#need-help</button>
      <button class="chip" data-group="channel" data-val="meetup-events">#meetup-events</button>
      <button class="chip" data-group="channel" data-val="topic-of-the-day">#topic-of-the-day</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>Status</th><th>Channel</th><th>Source</th><th>Title</th><th>Score</th><th>Posted At</th>
      </tr></thead>
      <tbody id="log-body"><tr><td colspan="6" class="empty-state">Loading...</td></tr></tbody>
    </table>
  </div>

  <div class="section-header" style="margin-top:36px"><span class="section-title">Content Sources</span><hr /></div>
  <div class="sources-grid" id="sources-grid"></div>

</div>

<script>
var REPO_OWNER  = 'RomanBazylev';
var REPO_NAME   = 'microsoft_COE_manager';
var WORKFLOW_ID = 'autoposter.yml';
var LOG_URL     = './post_log.json';
var PAT_KEY     = 'sf_coe_gh_pat';

var SOURCES = [
  {domain:'salesforce.com/blog (certifications)',icon:'RSS',type:'rss',channels:['certification']},
  {domain:'salesforce.com/blog',icon:'RSS',type:'rss',channels:['salesforce-rss','topic-of-the-day']},
  {domain:'salesforce.com/blog (events)',icon:'RSS',type:'rss',channels:['meetup-events']},
  {domain:'focusonforce.com',icon:'RSS',type:'rss',channels:['certification']},
  {domain:'sfdc99.com',icon:'RSS',type:'rss',channels:['certification']},
  {domain:'salesforceben.com',icon:'RSS',type:'rss',channels:['certification','salesforce-rss','topic-of-the-day']},
  {domain:'adminhero.com',icon:'RSS',type:'rss',channels:['certification']},
  {domain:'andyinthecloud.com',icon:'RSS',type:'rss',channels:['playground']},
  {domain:'unofficialsf.com',icon:'RSS',type:'rss',channels:['playground']},
  {domain:'reddit.com/r/salesforcedev',icon:'RSS',type:'rss',channels:['playground']},
  {domain:'reddit.com/r/salesforce',icon:'RSS',type:'rss',channels:['need-help']},
  {domain:'salesforce.stackexchange.com',icon:'RSS',type:'rss',channels:['need-help']},
  {domain:'automationchampion.com',icon:'RSS',type:'rss',channels:['salesforce-rss','topic-of-the-day']},
  {domain:'youtube.com (SF Admins)',icon:'YT',type:'youtube',channels:['certification']},
  {domain:'youtube.com (SF Developers)',icon:'YT',type:'youtube',channels:['playground']},
];

var CHANNEL_CSS = {
  'certification':'ch-certification',
  'playground':'ch-playground',
  'salesforce-rss':'ch-salesforce-rss',
  'need-help':'ch-need-help',
  'meetup-events':'ch-meetup-events',
  'topic-of-the-day':'ch-topic-of-the-day',
};

var allItems = [];
var filters = {status:'all',source:'all',channel:'all'};

async function loadLog() {
  try {
    var r = await fetch(LOG_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var raw = await r.json();
    allItems = raw.slice().reverse();
    renderStats();
    renderTable();
    renderSources();
  } catch(e) {
    document.getElementById('log-body').innerHTML =
      '<tr><td colspan="6" class="empty-state">Could not load post_log.json: ' + e.message + '</td></tr>';
    document.getElementById('last-run').innerHTML = '<span class="live-dot"></span>No data';
  }
}

function renderStats() {
  var posted  = allItems.filter(function(i){return i.status==='posted';});
  var failed  = allItems.filter(function(i){return i.status==='failed';});
  var total   = posted.length + failed.length;
  var rate    = total > 0 ? Math.round(posted.length/total*100) : 0;
  var weekAgo = Date.now() - 7*86400000;
  var week    = posted.filter(function(i){return new Date(i.posted_at).getTime() > weekAgo;}).length;
  var channels = [];
  posted.forEach(function(i){ if(channels.indexOf(i.channel)<0) channels.push(i.channel); });
  var lastItem = allItems.find(function(i){return i.posted_at;});
  document.getElementById('stat-total').textContent    = posted.length;
  document.getElementById('stat-week').textContent     = week;
  document.getElementById('stat-failed').textContent   = failed.length;
  document.getElementById('stat-rate').textContent     = total > 0 ? rate + '%' : '-';
  document.getElementById('stat-channels').textContent = channels.length;
  document.getElementById('stat-channels-list').textContent = channels.map(function(c){return '#'+c;}).join(', ');
  document.getElementById('stat-last').textContent     = lastItem ? relTime(lastItem.posted_at) : '-';
  var lastFull = lastItem ? new Date(lastItem.posted_at).toUTCString() : 'never';
  document.getElementById('last-run').innerHTML = '<span class="live-dot"></span>Last run: ' + lastFull;
}

function renderTable() {
  var visible = allItems.filter(function(item){
    if(filters.status  !== 'all' && item.status  !== filters.status)  return false;
    if(filters.source  !== 'all' && item.source  !== filters.source)  return false;
    if(filters.channel !== 'all' && item.channel !== filters.channel) return false;
    return true;
  });
  var tbody = document.getElementById('log-body');
  if(!visible.length){
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No items match the current filters.</td></tr>';
    return;
  }
  tbody.innerHTML = visible.map(function(item){
    var statusBadge = item.status==='posted'
      ? '<span class="badge badge-posted">posted</span>'
      : item.status==='dry-run'
      ? '<span class="badge badge-dry">dry-run</span>'
      : '<span class="badge badge-failed">failed</span>';
    var chCss = CHANNEL_CSS[item.channel] || '';
    var channelBadge = '<span class="channel-badge '+chCss+'">#'+esc(item.channel)+'</span>';
    var srcIcon = item.source==='youtube' ? 'YT' : 'RSS';
    var domain  = item.feed_domain || (item.source==='youtube' ? 'youtube.com' : '');
    var sourceCell = '<span class="source-badge">'+srcIcon+' '+esc(domain)+'</span>';
    var titleHtml = item.url
      ? '<a href="'+esc(item.url)+'" target="_blank" rel="noopener noreferrer">'+esc(item.title)+'</a>'
      : esc(item.title);
    var errorHtml = (item.status==='failed' && item.error)
      ? '<div class="error-msg">'+esc(item.error)+'</div>' : '';
    var score = item.relevance_score != null ? Math.round(item.relevance_score*100) : null;
    var scoreHtml = score != null
      ? '<div class="score-bar"><div class="score-track"><div class="score-fill '+(score>=80?'hi':score<50?'lo':'')+'" style="width:'+score+'%"></div></div><span class="score-num">'+score+'%</span></div>'
      : '<span class="score-num">-</span>';
    var ts = item.posted_at
      ? '<span class="ts" title="'+new Date(item.posted_at).toUTCString()+'">'+relTime(item.posted_at)+'</span>'
      : '<span class="ts">-</span>';
    return '<tr><td>'+statusBadge+'</td><td>'+channelBadge+'</td><td>'+sourceCell+'</td><td class="title-cell">'+titleHtml+errorHtml+'</td><td>'+scoreHtml+'</td><td>'+ts+'</td></tr>';
  }).join('');
}

function renderSources() {
  var cutoff30 = Date.now() - 30*86400000;
  var activeDomains = [];
  allItems.forEach(function(i){
    if(i.posted_at && new Date(i.posted_at).getTime() > cutoff30 && i.feed_domain){
      if(activeDomains.indexOf(i.feed_domain)<0) activeDomains.push(i.feed_domain);
    }
  });
  var grid = document.getElementById('sources-grid');
  grid.innerHTML = SOURCES.map(function(s){
    var isActive = activeDomains.some(function(d){
      var key = s.domain.toLowerCase().split(' ')[0];
      return d && (key.includes(d) || d.includes(key));
    });
    var statusHtml = isActive
      ? '<div class="source-status ok">active (seen last 30d)</div>'
      : '<div class="source-status stale">no recent posts</div>';
    var chipsHtml = s.channels.map(function(c){
      return '<span class="channel-badge '+(CHANNEL_CSS[c]||'')+'" style="font-size:10px;padding:1px 6px">#'+c+'</span>';
    }).join('');
    var iconHtml = s.icon==='YT' ? '<span style="color:#ff5252">YT</span>' : '<span style="color:var(--accent)">RSS</span>';
    return '<div class="source-card"><div class="source-icon">'+iconHtml+'</div><div class="source-info"><div class="source-domain">'+esc(s.domain)+'</div><div class="source-channels">'+chipsHtml+'</div>'+statusHtml+'</div></div>';
  }).join('');
}

document.getElementById('filter-bar').addEventListener('click', function(e){
  var chip = e.target.closest('.chip');
  if(!chip) return;
  var group = chip.dataset.group;
  var val   = chip.dataset.val;
  if(!group) return;
  chip.closest('.filter-group').querySelectorAll('.chip').forEach(function(c){c.classList.remove('active');});
  chip.classList.add('active');
  filters[group] = val;
  renderTable();
});

function getToken(){ return localStorage.getItem(PAT_KEY) || ''; }

function resetToken(){
  var t = prompt('Enter your GitHub Fine-grained PAT (Actions: write on this repo).\nLeave blank to clear stored token.');
  if(t===null) return;
  if(t.trim()){ localStorage.setItem(PAT_KEY,t.trim()); showToast('Token saved in localStorage','ok'); }
  else { localStorage.removeItem(PAT_KEY); showToast('Token cleared','ok'); }
}

async function runNow(){
  var token = getToken();
  if(!token){
    token = prompt('Enter your GitHub Fine-grained PAT\n(needs Actions: write on this repo).\nSaved in browser localStorage only.');
    if(!token||!token.trim()) return;
    localStorage.setItem(PAT_KEY,token.trim());
    token = token.trim();
  }
  var btn = document.getElementById('btn-run');
  btn.disabled = true; btn.textContent = 'Triggering...';
  try {
    var resp = await fetch(
      'https://api.github.com/repos/'+REPO_OWNER+'/'+REPO_NAME+'/actions/workflows/'+WORKFLOW_ID+'/dispatches',
      { method:'POST',
        headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github+json','Content-Type':'application/json'},
        body:JSON.stringify({ref:'main'}) }
    );
    if(resp.status===204){ showToast('Workflow triggered - check Actions tab','ok'); }
    else if(resp.status===401){ localStorage.removeItem(PAT_KEY); showToast('Invalid token (401) - cleared, try again','err'); }
    else if(resp.status===403){ showToast('Forbidden (403) - PAT lacks Actions:write','err'); }
    else { var body=await resp.text(); showToast('Error '+resp.status+': '+body.slice(0,80),'err'); }
  } catch(err){ showToast('Network error: '+err.message,'err'); }
  finally { btn.disabled=false; btn.textContent='Run Now'; }
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function relTime(iso){
  var diff = Date.now() - new Date(iso).getTime();
  var m = Math.floor(diff/60000);
  if(m<2)  return 'just now';
  if(m<60) return m+'m ago';
  var h = Math.floor(m/60);
  if(h<24) return h+'h ago';
  var d = Math.floor(h/24);
  if(d<30) return d+'d ago';
  return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

function showToast(msg,type){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show '+(type||'');
  clearTimeout(t._timer);
  t._timer = setTimeout(function(){ t.className=''; }, 4000);
}

loadLog();
setInterval(loadLog, 5*60*1000);
</script>
</body>
</html>
