<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Salesforce Tip of the Day</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1200px;
    min-height: 675px;
    background: #0d1117;
    font-family: 'Inter', -apple-system, sans-serif;
    color: #e6edf3;
    padding: 0;
    overflow: hidden;
  }

  .card {
    width: 1200px;
    min-height: 675px;
    background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 36px 44px 28px;
    gap: 20px;
  }

  /* Subtle grid overlay */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,112,210,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,112,210,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Top header row */
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .header-left {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }

  .label-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,112,210,0.15);
    border: 1px solid rgba(0,112,210,0.4);
    color: #58a6ff;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    width: fit-content;
  }

  .tip-tag {
    font-size: 11px;
    color: #ff7b72;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  h1.title {
    font-size: 28px;
    font-weight: 800;
    line-height: 1.2;
    color: #ffffff;
    max-width: 720px;
    letter-spacing: -0.02em;
  }

  .subtitle {
    font-size: 14px;
    color: #8b949e;
    line-height: 1.5;
    max-width: 680px;
  }

  .sf-logo {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }

  .sf-logo svg { width: 44px; height: 44px; }

  .sf-logo-text {
    font-size: 10px;
    color: #8b949e;
    letter-spacing: 0.05em;
  }

  /* Code columns */
  .code-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    flex: 1;
  }

  .code-block {
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid;
    display: flex;
    flex-direction: column;
  }

  .code-block.before {
    border-color: rgba(248, 81, 73, 0.4);
    background: rgba(248, 81, 73, 0.05);
  }

  .code-block.after {
    border-color: rgba(63, 185, 80, 0.4);
    background: rgba(63, 185, 80, 0.05);
  }

  .code-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    border-bottom: 1px solid;
  }

  .code-block.before .code-header {
    background: rgba(248, 81, 73, 0.12);
    border-color: rgba(248, 81, 73, 0.3);
    color: #ff7b72;
  }

  .code-block.after .code-header {
    background: rgba(63, 185, 80, 0.12);
    border-color: rgba(63, 185, 80, 0.3);
    color: #3fb950;
  }

  .code-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .code-block.before .code-dot { background: #ff7b72; }
  .code-block.after  .code-dot { background: #3fb950; }

  pre {
    padding: 14px 16px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 12.5px;
    line-height: 1.65;
    overflow: hidden;
    flex: 1;
    color: #e6edf3;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Syntax colors — inline, no CDN needed */
  .kw  { color: #ff7b72; }   /* keywords: String, void, return */
  .ty  { color: #ffa657; }   /* types: Integer, List, Map */
  .st  { color: #a5d6ff; }   /* strings */
  .cm  { color: #6e7681; font-style: italic; } /* comments */
  .fn  { color: #d2a8ff; }   /* method names */
  .nu  { color: #79c0ff; }   /* numbers */
  .op  { color: #ff7b72; }   /* operators */
  .id  { color: #e6edf3; }   /* identifiers */

  /* Bottom row: use cases + benefit */
  .bottom-row {
    display: flex;
    align-items: flex-start;
    gap: 24px;
  }

  .use-cases {
    flex: 1;
  }

  .use-cases-title {
    font-size: 11px;
    font-weight: 700;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .use-cases ul {
    list-style: none;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .use-cases li {
    background: rgba(88, 166, 255, 0.08);
    border: 1px solid rgba(88, 166, 255, 0.2);
    border-radius: 6px;
    padding: 4px 12px;
    font-size: 12px;
    color: #58a6ff;
    font-weight: 500;
  }

  .benefit-box {
    flex: 1;
    background: rgba(255,215,0,0.05);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .benefit-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

  .benefit-text {
    font-size: 13px;
    color: #e6c87a;
    line-height: 1.5;
    font-weight: 500;
  }

  /* Footer */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 4px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .source-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #6e7681;
  }

  .source-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #3fb950;
  }

  .footer-brand {
    font-size: 11px;
    color: #3d444d;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  /* No-code fallback (when Gemini unavailable) */
  .fallback-body {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 0;
  }

  .fallback-content {
    max-width: 800px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 32px 40px;
    text-align: center;
  }

  .fallback-content p {
    font-size: 18px;
    color: #c9d1d9;
    line-height: 1.7;
    font-weight: 500;
  }

  .read-more {
    display: inline-block;
    margin-top: 16px;
    background: rgba(0,112,210,0.15);
    border: 1px solid rgba(0,112,210,0.4);
    color: #58a6ff;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 20px;
    border-radius: 8px;
    text-decoration: none;
  }
</style>
</head>
<body>
<div class="card">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <span class="tip-tag">🔥 Tip of the Day</span>
      <h1 class="title">{{TITLE}}</h1>
      <p class="subtitle">{{SUBTITLE}}</p>
    </div>
    <div class="sf-logo">
      <!-- Salesforce cloud SVG -->
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M26.3 14.5C28.3 12.3 31.1 11 34.2 11C38.7 11 42.6 13.7 44.5 17.6C46 16.9 47.7 16.5 49.5 16.5C55.8 16.5 61 21.7 61 28C61 34.3 55.8 39.5 49.5 39.5H14.5C9.5 39.5 5.5 35.5 5.5 30.5C5.5 25.8 9.1 22 13.6 21.6C13.2 20.5 13 19.3 13 18C13 15 15.1 12.4 18 11.7C19.5 10.6 21.3 10 23.2 10C24.4 10 25.5 10.2 26.3 10.5V14.5Z" fill="#0176D3"/>
        <path d="M26.3 14.5C28.3 12.3 31.1 11 34.2 11C38.7 11 42.6 13.7 44.5 17.6C46 16.9 47.7 16.5 49.5 16.5C55.8 16.5 61 21.7 61 28C61 34.3 55.8 39.5 49.5 39.5H14.5C9.5 39.5 5.5 35.5 5.5 30.5C5.5 25.8 9.1 22 13.6 21.6C13.2 20.5 13 19.3 13 18C13 15 15.1 12.4 18 11.7C19.5 10.6 21.3 10 23.2 10C24.4 10 25.5 10.2 26.3 10.5V14.5Z" fill="url(#sfGrad)"/>
        <defs>
          <linearGradient id="sfGrad" x1="5.5" y1="10" x2="61" y2="39.5" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#0176D3"/>
            <stop offset="100%" stop-color="#1B96FF"/>
          </linearGradient>
        </defs>
      </svg>
      <span class="sf-logo-text">salesforce</span>
    </div>
  </div>

  <!-- CODE SECTION (shown only when has_code=true) -->
  {{CODE_SECTION}}

  <!-- BOTTOM ROW -->
  <div class="bottom-row">
    {{USE_CASES_HTML}}
    <div class="benefit-box">
      <span class="benefit-icon">💡</span>
      <span class="benefit-text">{{BENEFIT}}</span>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="source-badge">
      <span class="source-dot"></span>
      <span>Source: {{SOURCE_DOMAIN}}</span>
    </div>
    <span class="label-badge">{{LABEL}}</span>
    <span class="footer-brand">SF CoE · {{DATE}}</span>
  </div>

</div>
</body>
</html>
